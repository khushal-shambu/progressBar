name: Run Tests

on:
  push:
    branches:
      - main
      - feature/*
      - feature-v1.4
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install pytest

      - name: Run tests
        run: |
          pytest